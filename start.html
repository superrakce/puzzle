<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開始拼圖</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="btn btn-secondary" href="index.html">← 返回首頁</a>
      <div class="progress">開始拼圖</div>
      <button id="btnReload" class="btn btn-primary">重新載入圖片</button>
    </div>

    <section class="panel" style="padding:24px;">
      <div class="page-head">
        <div>
          <h1 class="page-title">開始拼圖</h1>
          <p class="page-desc">選擇一張圖片開始遊玩。頁面會自動從目前 GitHub Pages 專案的 data 資料夾載入拼圖。</p>
        </div>
      </div>

      <div id="loadNotice" class="notice">載入中...</div>
      <div style="height:20px"></div>
      <div id="cardList" class="cards"></div>
    </section>
  </div>

  <script src="assets/app.js"></script>
  <script>
    (()=>{
      const $ = selector => document.querySelector(selector);
      const cardList = $('#cardList');
      const loadNotice = $('#loadNotice');
      const btnReload = $('#btnReload');

      function renderCards(items){
        cardList.innerHTML = '';

        if(!items.length){
          cardList.innerHTML = '<div class="notice">目前沒有可用拼圖。</div>';
          return;
        }

        items.forEach(item=>{
          const card = document.createElement('article');
          card.className = 'thumb';
          card.innerHTML = `
            <div class="img-wrap">
              <img src="${item.thumbDataUrl || item.imageDataUrl}" alt="${item.name}">
            </div>
            <div class="meta">
              <h3>${item.name}</h3>
              <p>${item.cols} × ${item.rows} ｜ 共 ${item.cols * item.rows} 片</p>
            </div>
          `;
          card.addEventListener('click', ()=>{
            PUZZLE_APP.saveSelectedPuzzle(item);
            location.href = 'play.html';
          });
          cardList.appendChild(card);
        });
      }

      function getGithubPagesConfig(){
        const {protocol, hostname, pathname} = window.location;

        if(protocol === 'file:'){
          throw new Error('請改用 GitHub Pages 或本機伺服器開啟，不能直接用 file:// 測試。');
        }

        if(!hostname.endsWith('.github.io')){
          throw new Error('目前網址不是 GitHub Pages，無法自動判斷 repo 位置。');
        }

        const owner = hostname.replace(/\.github\.io$/, '');
        const pathParts = pathname.split('/').filter(Boolean);
        const firstPart = pathParts[0] || '';
        const repo = firstPart && !firstPart.endsWith('.html')
          ? firstPart
          : `${owner}.github.io`;

        return {
          owner,
          repo,
          branch: 'main',
          path: 'data'
        };
      }

      async function loadPuzzles(){
        try{
          loadNotice.textContent = '載入圖片資料中...';
          const config = getGithubPagesConfig();
          const items = await PUZZLE_APP.loadRemoteList(
            config.owner,
            config.repo,
            config.branch,
            config.path
          );
          renderCards(items);
          loadNotice.textContent = `已載入 ${items.length} 張拼圖。`;
        }catch(err){
          cardList.innerHTML = '';
          loadNotice.textContent = `載入失敗：${err.message}`;
        }
      }

      btnReload.addEventListener('click', loadPuzzles);
      loadPuzzles();
    })();
  </script>
</body>
</html>
