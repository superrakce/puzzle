<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>開始拼圖</title><link rel="stylesheet" href="assets/style.css"/></head><body><div class="container"><div class="topbar"><a class="btn btn-secondary" href="index.html">← 返回首頁</a><div class="progress">開始拼圖</div></div><section class="panel" style="padding:24px;"><div class="page-head"><div><h1 class="page-title">開始拼圖</h1><p class="page-desc">從現有拼圖中選一張開始遊玩。可使用本地 manifest，或讀取 GitHub 上的 JSON 列表。</p></div></div><div class="grid-2"><div class="card"><h3 style="margin-top:0">資料來源設定</h3><div class="grid-2" style="gap:12px"><div class="field"><label>GitHub Owner</label><input id="ghOwner" type="text" placeholder="例如 your-account"/></div><div class="field"><label>Repo</label><input id="ghRepo" type="text" placeholder="例如 puzzle-project"/></div><div class="field"><label>Branch</label><input id="ghBranch" type="text" value="main"/></div><div class="field"><label>JSON 路徑</label><input id="ghPath" type="text" value="data/json"/></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button id="btnLoadLocal" class="btn btn-secondary">讀取本地 manifest</button><button id="btnLoadGithub" class="btn btn-primary">讀取 GitHub JSON</button></div><div id="loadNotice" class="notice" style="margin-top:16px">預設可先讀取專案內建的 manifest 測試。</div></div><div class="card"><h3 style="margin-top:0">說明</h3><p class="small">如果你部署到 GitHub Pages，可以把新產生的 JSON 放到 <code>data/json/</code>，然後在這頁輸入 repo 設定來自動載入。</p><p class="small">目前這個版本的 JSON 直接內含圖片資料（base64 Data URL），所以上傳 JSON 後就能直接玩。</p></div></div><div style="height:20px"></div><div id="cardList" class="cards"></div></section></div><script src="assets/app.js"></script><script>
(()=>{const $=s=>document.querySelector(s),cardList=$('#cardList'),loadNotice=$('#loadNotice');function renderCards(items){cardList.innerHTML='';if(!items.length){cardList.innerHTML='<div class="notice">目前沒有可用拼圖。</div>';return}items.forEach(item=>{const card=document.createElement('article');card.className='thumb';card.innerHTML=`<div class="img-wrap"><img src="${item.thumbDataUrl||item.imageDataUrl}" alt="${item.name}"></div><div class="meta"><h3>${item.name}</h3><p>${item.cols} × ${item.rows} ｜ 共 ${item.cols*item.rows} 片</p></div>`;card.addEventListener('click',()=>{PUZZLE_APP.saveSelectedPuzzle(item);location.href='play.html'});cardList.appendChild(card)})}
async function loadLocal(){try{loadNotice.textContent='載入本地資料中...';const items=await PUZZLE_APP.loadManifestList();renderCards(items);loadNotice.textContent=`已載入 ${items.length} 張拼圖。`}catch(err){loadNotice.textContent='本地載入失敗：'+err.message}}
async function loadGithub(){try{const owner=$('#ghOwner').value.trim(),repo=$('#ghRepo').value.trim(),branch=$('#ghBranch').value.trim()||'main',path=$('#ghPath').value.trim()||'data/json';if(!owner||!repo){loadNotice.textContent='請先輸入 GitHub Owner 與 Repo。';return}loadNotice.textContent='從 GitHub 載入中...';const items=await PUZZLE_APP.loadRemoteList(owner,repo,branch,path);renderCards(items);loadNotice.textContent=`已從 GitHub 載入 ${items.length} 張拼圖。`}catch(err){loadNotice.textContent='GitHub 載入失敗：'+err.message}}
$('#btnLoadLocal').addEventListener('click',loadLocal);$('#btnLoadGithub').addEventListener('click',loadGithub);loadLocal();})();
</script></body></html>
