<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開始遊玩</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="btn btn-secondary" href="start.html">← 返回拼圖列表</a>
      <div class="progress" id="progressText">拼圖準備中</div>
      <div style="display:flex;gap:10px">
        <button id="btnShuffle" class="btn btn-secondary">重新打亂</button>
      </div>
    </div>

    <section class="panel" style="padding:24px;">
      <div class="page-head">
        <div>
          <h1 id="puzzleTitle" class="page-title">拼圖</h1>
          <p id="puzzleDesc" class="page-desc">載入中...</p>
        </div>
      </div>

      <div id="emptyNotice" class="notice hidden">尚未選擇拼圖，請先回到拼圖列表選擇一張。</div>

      <div id="gameWrap" class="hidden">
        <div class="canvas-stage">
          <canvas id="gameCanvas" class="game-canvas"></canvas>
          <div id="confettiLayer" class="confetti-layer"></div>
        </div>
        <div class="canvas-status">
          <div id="pieceStatus" class="small"></div>
          <div class="small">中央是主放置區，四周留白可暫放尚未完成的拼圖塊。</div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="assets/app.js"></script>
  <script>
    (()=>{
      const $ = selector => document.querySelector(selector);
      const selected = PUZZLE_APP.getSelectedPuzzle();
      const emptyNotice = $('#emptyNotice');
      const gameWrap = $('#gameWrap');
      const gameCanvas = $('#gameCanvas');
      const confettiLayer = $('#confettiLayer');
      const pieceStatus = $('#pieceStatus');
      const progressText = $('#progressText');
      const puzzleTitle = $('#puzzleTitle');
      const puzzleDesc = $('#puzzleDesc');
      const btnShuffle = $('#btnShuffle');

      if(!selected){
        emptyNotice.classList.remove('hidden');
        return;
      }

      gameWrap.classList.remove('hidden');
      puzzleTitle.textContent = selected.name;
      puzzleDesc.textContent = `${selected.cols} × ${selected.rows} ｜ ${PUZZLE_APP.getShapeLabel(selected.shapeType)} ｜ 共 ${selected.cols * selected.rows} 片`;

      const image = new Image();
      image.crossOrigin = 'anonymous';
      image.src = selected.imageDataUrl;

      const audioState = { ctx: null };
      const state = {
        pieces: [],
        placed: 0,
        draggingId: null,
        dragOffsetX: 0,
        dragOffsetY: 0,
        canvasWidth: 0,
        canvasHeight: 0,
        boardRect: null,
        cellW: 0,
        cellH: 0,
        feedbackRaf: null,
        completed: false
      };

      function setStatus(){
        pieceStatus.textContent = `已完成 ${state.placed} / ${state.pieces.length}`;
        progressText.textContent = state.placed === state.pieces.length
          ? '完成！'
          : `拼圖進行中 ${state.placed}/${state.pieces.length}`;
      }

      function clamp(value, min, max){
        return Math.min(Math.max(value, min), max);
      }

      function getAudioContext(){
        if(!audioState.ctx){
          audioState.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if(audioState.ctx.state === 'suspended'){
          audioState.ctx.resume();
        }
        return audioState.ctx;
      }

      function playTone(startFreq, duration, type, volume, endFreq = startFreq, delay = 0){
        const ctx = getAudioContext();
        const now = ctx.currentTime + delay;
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(startFreq, now);
        oscillator.frequency.linearRampToValueAtTime(endFreq, now + duration);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now);
        oscillator.stop(now + duration + 0.03);
      }

      function playSuccessSound(){
        playTone(720, 0.12, 'triangle', 0.05, 920, 0);
        playTone(980, 0.16, 'sine', 0.035, 1180, 0.07);
      }

      function playErrorSound(){
        playTone(240, 0.12, 'square', 0.045, 190, 0);
        playTone(180, 0.12, 'square', 0.04, 140, 0.11);
      }

      function launchConfetti(){
        if(typeof gsap === 'undefined'){
          return;
        }

        confettiLayer.innerHTML = '';
        const colors = ['#2563eb', '#f97316', '#16a34a', '#ef4444', '#eab308', '#0ea5e9'];
        const count = 48;
        const centerX = state.canvasWidth / 2;
        const centerY = Math.max(40, state.boardRect.y + state.boardRect.height * 0.18);

        for(let i = 0; i < count; i++){
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          piece.style.background = colors[i % colors.length];
          piece.style.left = `${centerX}px`;
          piece.style.top = `${centerY}px`;
          confettiLayer.appendChild(piece);

          const angle = (-110 + (220 * i) / count) * (Math.PI / 180);
          const distance = 140 + Math.random() * 260;
          const x = Math.cos(angle) * distance;
          const y = Math.sin(angle) * distance + 180 + Math.random() * 160;
          const rotation = Math.random() * 720 - 360;
          const delay = Math.random() * 0.18;

          gsap.fromTo(piece,
            { x: 0, y: 0, rotation: 0, opacity: 1, scale: 0.8 },
            {
              x,
              y,
              rotation,
              opacity: 0,
              scale: 1,
              duration: 1.8 + Math.random() * 0.5,
              delay,
              ease: 'power2.out',
              onComplete: ()=>piece.remove()
            }
          );
        }
      }

      function hasActiveErrors(){
        const now = performance.now();
        return state.pieces.some(piece=>piece.errorFlashUntil && piece.errorFlashUntil > now);
      }

      function ensureFeedbackLoop(){
        if(state.feedbackRaf){
          return;
        }

        const tick = ()=>{
          renderCanvas();
          if(hasActiveErrors()){
            state.feedbackRaf = requestAnimationFrame(tick);
          }else{
            state.feedbackRaf = null;
          }
        };

        state.feedbackRaf = requestAnimationFrame(tick);
      }

      function markPieceError(piece){
        piece.errorFlashStart = performance.now();
        piece.errorFlashUntil = piece.errorFlashStart + 1500;
        playErrorSound();
        ensureFeedbackLoop();
      }

      function maybeCelebrateCompletion(){
        if(state.placed === state.pieces.length && !state.completed){
          state.completed = true;
          launchConfetti();
        }
      }

      function getCanvasPoint(event){
        const rect = gameCanvas.getBoundingClientRect();
        const scaleX = state.canvasWidth / rect.width;
        const scaleY = state.canvasHeight / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY
        };
      }

      function computeLayout(){
        const stageWidth = gameCanvas.parentElement.clientWidth;
        const cssWidth = Math.max(320, stageWidth);
        const cssHeight = Math.max(620, Math.min(920, Math.round(cssWidth * 0.86)));
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        gameCanvas.width = Math.round(cssWidth * dpr);
        gameCanvas.height = Math.round(cssHeight * dpr);
        gameCanvas.style.height = `${cssHeight}px`;

        const ctx = gameCanvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);

        state.canvasWidth = cssWidth;
        state.canvasHeight = cssHeight;

        const marginX = cssWidth * 0.18;
        const marginY = cssHeight * 0.16;
        let boardWidth = cssWidth - marginX * 2;
        let boardHeight = boardWidth * (image.naturalHeight / image.naturalWidth);
        const maxBoardHeight = cssHeight - marginY * 2;

        if(boardHeight > maxBoardHeight){
          boardHeight = maxBoardHeight;
          boardWidth = boardHeight * (image.naturalWidth / image.naturalHeight);
        }

        state.boardRect = {
          x: Math.round((cssWidth - boardWidth) / 2),
          y: Math.round((cssHeight - boardHeight) / 2),
          width: Math.round(boardWidth),
          height: Math.round(boardHeight)
        };
        state.cellW = state.boardRect.width / selected.cols;
        state.cellH = state.boardRect.height / selected.rows;
      }

      function drawBackground(ctx){
        ctx.clearRect(0, 0, state.canvasWidth, state.canvasHeight);

        const board = state.boardRect;
        ctx.save();
        ctx.fillStyle = 'rgba(37,99,235,0.05)';
        ctx.strokeStyle = 'rgba(37,99,235,0.16)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(board.x - 14, board.y - 14, board.width + 28, board.height + 28, 20);
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        PUZZLE_APP.drawPuzzleGuide(ctx, board, selected.cols, selected.rows, selected.shapeType);
      }

      function drawErrorFeedback(ctx, piece){
        const now = performance.now();
        if(!piece.errorFlashUntil || piece.errorFlashUntil <= now){
          return;
        }

        const elapsed = now - piece.errorFlashStart;
        const visible = Math.floor(elapsed / 250) % 2 === 0;
        if(!visible){
          return;
        }

        ctx.save();
        ctx.strokeStyle = 'rgba(239,68,68,0.95)';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(239,68,68,0.45)';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.roundRect(piece.x - 4, piece.y - 4, piece.width + 8, piece.height + 8, 14);
        ctx.stroke();
        ctx.restore();
      }

      function drawPieces(ctx){
        const ordered = [
          ...state.pieces.filter(piece=>piece.placed),
          ...state.pieces.filter(piece=>!piece.placed && piece.id !== state.draggingId),
          ...state.pieces.filter(piece=>piece.id === state.draggingId)
        ];

        ordered.forEach(piece=>{
          ctx.save();
          ctx.drawImage(piece.image, piece.x, piece.y, piece.width, piece.height);
          ctx.restore();
          drawErrorFeedback(ctx, piece);
        });
      }

      function renderCanvas(){
        const ctx = gameCanvas.getContext('2d');
        drawBackground(ctx);
        drawPieces(ctx);
      }

      function getTargetPosition(piece){
        return {
          x: state.boardRect.x + piece.boardXUnits * state.cellW,
          y: state.boardRect.y + piece.boardYUnits * state.cellH
        };
      }

      function getZones(){
        const board = state.boardRect;
        const padding = 14;
        return [
          {x: padding, y: padding, width: state.canvasWidth - padding * 2, height: Math.max(40, board.y - padding * 2)},
          {x: padding, y: board.y + board.height + padding, width: state.canvasWidth - padding * 2, height: Math.max(40, state.canvasHeight - (board.y + board.height) - padding * 2)},
          {x: padding, y: board.y, width: Math.max(40, board.x - padding * 2), height: board.height},
          {x: board.x + board.width + padding, y: board.y, width: Math.max(40, state.canvasWidth - (board.x + board.width) - padding * 2), height: board.height}
        ].filter(zone=>zone.width > 24 && zone.height > 24);
      }

      function randomizeUnplacedPieces(){
        const zones = getZones();
        state.pieces.forEach((piece, index)=>{
          if(piece.placed){
            const target = getTargetPosition(piece);
            piece.x = target.x;
            piece.y = target.y;
            return;
          }

          const zone = zones[index % zones.length] || {
            x: 20,
            y: 20,
            width: state.canvasWidth - 40,
            height: state.canvasHeight - 40
          };
          const maxX = Math.max(zone.x, zone.x + zone.width - piece.width);
          const maxY = Math.max(zone.y, zone.y + zone.height - piece.height);
          piece.x = Math.round(zone.x + Math.random() * Math.max(0, maxX - zone.x));
          piece.y = Math.round(zone.y + Math.random() * Math.max(0, maxY - zone.y));
          piece.errorFlashUntil = 0;
        });
      }

      function createPieceModels(pieceDataList){
        return Promise.all(pieceDataList.map(pieceData=>new Promise(resolve=>{
          const pieceImage = new Image();
          pieceImage.onload = ()=>{
            resolve({
              ...pieceData,
              image: pieceImage,
              width: pieceData.widthUnits * state.cellW,
              height: pieceData.heightUnits * state.cellH,
              x: 0,
              y: 0,
              placed: false,
              errorFlashStart: 0,
              errorFlashUntil: 0
            });
          };
          pieceImage.src = pieceData.dataUrl;
        })));
      }

      function findPieceAt(point){
        const ordered = [...state.pieces].reverse();
        return ordered.find(piece=>{
          return (
            point.x >= piece.x &&
            point.x <= piece.x + piece.width &&
            point.y >= piece.y &&
            point.y <= piece.y + piece.height
          );
        }) || null;
      }

      function isOverBoardArea(piece){
        const centerX = piece.x + piece.width / 2;
        const centerY = piece.y + piece.height / 2;
        return (
          centerX >= state.boardRect.x &&
          centerX <= state.boardRect.x + state.boardRect.width &&
          centerY >= state.boardRect.y &&
          centerY <= state.boardRect.y + state.boardRect.height
        );
      }

      function trySnapPiece(piece){
        const target = getTargetPosition(piece);
        const currentCenterX = piece.x + piece.width / 2;
        const currentCenterY = piece.y + piece.height / 2;
        const boardCenterX = currentCenterX - state.boardRect.x;
        const boardCenterY = currentCenterY - state.boardRect.y;
        const targetCol = Math.floor(boardCenterX / state.cellW);
        const targetRow = Math.floor(boardCenterY / state.cellH);
        const nearTarget =
          Math.abs(piece.x - target.x) <= state.cellW * 0.35 &&
          Math.abs(piece.y - target.y) <= state.cellH * 0.35;
        const inCorrectCell = targetCol === piece.col && targetRow === piece.row;

        if(!nearTarget && !inCorrectCell){
          return false;
        }

        piece.x = target.x;
        piece.y = target.y;
        piece.errorFlashUntil = 0;
        if(!piece.placed){
          state.placed++;
        }
        piece.placed = true;
        playSuccessSound();
        return true;
      }

      function restoreOnCanvas(piece){
        piece.placed = false;
        piece.x = clamp(piece.x, 8, state.canvasWidth - piece.width - 8);
        piece.y = clamp(piece.y, 8, state.canvasHeight - piece.height - 8);
      }

      function handlePointerDown(event){
        const point = getCanvasPoint(event);
        const piece = findPieceAt(point);
        if(!piece){
          return;
        }

        if(piece.placed){
          state.placed--;
        }
        piece.placed = false;
        piece.errorFlashUntil = 0;
        state.draggingId = piece.id;
        state.dragOffsetX = point.x - piece.x;
        state.dragOffsetY = point.y - piece.y;

        const idx = state.pieces.findIndex(item=>item.id === piece.id);
        state.pieces.splice(idx, 1);
        state.pieces.push(piece);

        gameCanvas.setPointerCapture?.(event.pointerId);
        renderCanvas();
      }

      function handlePointerMove(event){
        if(!state.draggingId){
          return;
        }

        const piece = state.pieces.find(item=>item.id === state.draggingId);
        if(!piece){
          return;
        }

        const point = getCanvasPoint(event);
        piece.x = clamp(point.x - state.dragOffsetX, 4, state.canvasWidth - piece.width - 4);
        piece.y = clamp(point.y - state.dragOffsetY, 4, state.canvasHeight - piece.height - 4);
        renderCanvas();
      }

      function handlePointerUp(event){
        if(!state.draggingId){
          return;
        }

        const piece = state.pieces.find(item=>item.id === state.draggingId);
        state.draggingId = null;
        gameCanvas.releasePointerCapture?.(event.pointerId);

        if(piece){
          if(trySnapPiece(piece)){
            maybeCelebrateCompletion();
          }else if(isOverBoardArea(piece)){
            restoreOnCanvas(piece);
            markPieceError(piece);
          }else{
            restoreOnCanvas(piece);
          }
        }

        setStatus();
        renderCanvas();
      }

      async function initializeGame(resetPieces = true){
        const prevCanvasWidth = state.canvasWidth || 1;
        const prevCanvasHeight = state.canvasHeight || 1;
        computeLayout();

        if(resetPieces || !state.pieces.length){
          const pieceDataList = PUZZLE_APP.sliceImageToPieces(
            image,
            selected.cols,
            selected.rows,
            selected.shapeType
          );
          state.pieces = await createPieceModels(pieceDataList);
          state.placed = 0;
          state.completed = false;
          confettiLayer.innerHTML = '';
          randomizeUnplacedPieces();
        }else{
          state.pieces.forEach(piece=>{
            piece.width = piece.widthUnits * state.cellW;
            piece.height = piece.heightUnits * state.cellH;
            if(piece.placed){
              const target = getTargetPosition(piece);
              piece.x = target.x;
              piece.y = target.y;
            }else{
              piece.x = clamp(piece.x / prevCanvasWidth * state.canvasWidth, 8, state.canvasWidth - piece.width - 8);
              piece.y = clamp(piece.y / prevCanvasHeight * state.canvasHeight, 8, state.canvasHeight - piece.height - 8);
            }
          });
        }

        setStatus();
        renderCanvas();
      }

      image.onload = ()=>{
        initializeGame(true);
      };

      image.onerror = ()=>{
        emptyNotice.textContent = '圖片載入失敗，請確認 JSON 與同名圖片都在同一個資料夾。';
        emptyNotice.classList.remove('hidden');
        gameWrap.classList.add('hidden');
      };

      gameCanvas.addEventListener('pointerdown', handlePointerDown);
      gameCanvas.addEventListener('pointermove', handlePointerMove);
      gameCanvas.addEventListener('pointerup', handlePointerUp);
      gameCanvas.addEventListener('pointercancel', handlePointerUp);

      window.addEventListener('resize', ()=>{
        if(image.complete){
          initializeGame(false);
        }
      });

      btnShuffle.addEventListener('click', ()=>{
        state.placed = 0;
        state.completed = false;
        confettiLayer.innerHTML = '';
        state.pieces.forEach(piece=>{
          piece.placed = false;
          piece.errorFlashUntil = 0;
        });
        randomizeUnplacedPieces();
        setStatus();
        renderCanvas();
      });
    })();
  </script>
</body>
</html>
