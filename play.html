<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開始遊玩</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="btn btn-secondary" href="start.html">← 返回拼圖列表</a>
      <div class="progress" id="progressText">拼圖準備中</div>
      <div style="display:flex;gap:10px">
        <button id="btnShuffle" class="btn btn-secondary">重新打亂</button>
      </div>
    </div>

    <section class="panel" style="padding:24px;">
      <div class="page-head">
        <div>
          <h1 id="puzzleTitle" class="page-title">拼圖</h1>
          <p id="puzzleDesc" class="page-desc">載入中...</p>
        </div>
      </div>

      <div id="emptyNotice" class="notice hidden">尚未選擇拼圖，請先回到拼圖列表選擇一張。</div>

      <div id="gameWrap" class="puzzle-layout hidden">
        <div class="board-wrap">
          <div id="board" class="board">
            <div id="boardGrid" class="board-grid"></div>
          </div>
        </div>

        <div class="tray-wrap">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <strong>拼圖碎片</strong>
            <span id="pieceStatus" class="small"></span>
          </div>
          <div id="tray" class="tray"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="assets/app.js"></script>
  <script>
    (()=>{
      const $ = selector => document.querySelector(selector);
      const selected = PUZZLE_APP.getSelectedPuzzle();
      const emptyNotice = $('#emptyNotice');
      const gameWrap = $('#gameWrap');
      const board = $('#board');
      const boardGrid = $('#boardGrid');
      const tray = $('#tray');
      const pieceStatus = $('#pieceStatus');
      const progressText = $('#progressText');
      const puzzleTitle = $('#puzzleTitle');
      const puzzleDesc = $('#puzzleDesc');

      if(!selected){
        emptyNotice.classList.remove('hidden');
        return;
      }

      gameWrap.classList.remove('hidden');
      puzzleTitle.textContent = selected.name;
      puzzleDesc.textContent = `${selected.cols} × ${selected.rows} ｜ ${PUZZLE_APP.getShapeLabel(selected.shapeType)} ｜ 共 ${selected.cols * selected.rows} 片`;

      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = selected.imageDataUrl;

      const state = {
        pieces: [],
        placed: 0,
        cellW: 0,
        cellH: 0
      };

      function setStatus(){
        pieceStatus.textContent = `已完成 ${state.placed} / ${state.pieces.length}`;
        progressText.textContent = state.placed === state.pieces.length
          ? '完成！'
          : `拼圖進行中 ${state.placed}/${state.pieces.length}`;
      }

      function updateBoardGrid(){
        boardGrid.style.backgroundSize = `${100 / selected.cols}% ${100 / selected.rows}%`;
      }

      function randomPosInTray(pieceEl){
        const trayRect = tray.getBoundingClientRect();
        const width = pieceEl.offsetWidth || state.cellW;
        const height = pieceEl.offsetHeight || state.cellH;
        const maxX = Math.max(8, trayRect.width - width - 8);
        const maxY = Math.max(8, trayRect.height - height - 8);

        return {
          x: Math.round(Math.random() * maxX),
          y: Math.round(Math.random() * maxY)
        };
      }

      function placeBackToTray(piece){
        piece.placed = false;
        piece.el.classList.remove('placed');
        tray.appendChild(piece.el);
        const pos = randomPosInTray(piece.el);
        piece.el.style.left = `${pos.x}px`;
        piece.el.style.top = `${pos.y}px`;
      }

      function onDrop(piece, clientX, clientY){
        const boardRect = board.getBoundingClientRect();
        const isInside =
          clientX >= boardRect.left &&
          clientX <= boardRect.right &&
          clientY >= boardRect.top &&
          clientY <= boardRect.bottom;

        if(!isInside){
          if(piece.placed){
            state.placed--;
          }
          placeBackToTray(piece);
          setStatus();
          return;
        }

        const relX = clientX - boardRect.left;
        const relY = clientY - boardRect.top;
        const targetCol = Math.floor(relX / state.cellW);
        const targetRow = Math.floor(relY / state.cellH);
        const isCorrect = targetCol === piece.col && targetRow === piece.row;

        if(isCorrect){
          if(!piece.placed){
            state.placed++;
          }
          piece.placed = true;
          piece.el.classList.add('placed');
          board.appendChild(piece.el);
          piece.el.style.left = `${piece.boardXUnits * state.cellW}px`;
          piece.el.style.top = `${piece.boardYUnits * state.cellH}px`;
        }else{
          if(piece.placed){
            state.placed--;
          }
          placeBackToTray(piece);
        }

        setStatus();
        if(state.placed === state.pieces.length){
          setTimeout(()=>alert('完成拼圖！'), 50);
        }
      }

      function makeDraggable(piece){
        let startX = 0;
        let startY = 0;
        let originX = 0;
        let originY = 0;
        let dragging = false;

        const onPointerMove = event=>{
          if(!dragging){
            return;
          }

          const dx = event.clientX - startX;
          const dy = event.clientY - startY;
          piece.el.style.left = `${originX + dx}px`;
          piece.el.style.top = `${originY + dy}px`;
        };

        const onPointerUp = event=>{
          if(!dragging){
            return;
          }

          dragging = false;
          piece.el.classList.remove('dragging');
          piece.el.releasePointerCapture?.(event.pointerId);
          document.removeEventListener('pointermove', onPointerMove);
          document.removeEventListener('pointerup', onPointerUp);
          onDrop(piece, event.clientX, event.clientY);
        };

        piece.el.addEventListener('pointerdown', event=>{
          if(piece.placed){
            state.placed--;
            piece.placed = false;
            piece.el.classList.remove('placed');
            tray.appendChild(piece.el);
          }

          dragging = true;
          piece.el.classList.add('dragging');
          piece.el.setPointerCapture?.(event.pointerId);
          startX = event.clientX;
          startY = event.clientY;

          const parentRect = piece.el.parentElement.getBoundingClientRect();
          const trayRect = tray.getBoundingClientRect();
          originX = piece.el.offsetLeft + (parentRect.left - trayRect.left);
          originY = piece.el.offsetTop + (parentRect.top - trayRect.top);

          tray.appendChild(piece.el);
          piece.el.style.left = `${originX}px`;
          piece.el.style.top = `${originY}px`;

          document.addEventListener('pointermove', onPointerMove);
          document.addEventListener('pointerup', onPointerUp);
        });
      }

      function render(){
        const baseSize = Math.min(720, window.innerWidth < 900 ? window.innerWidth - 72 : 720);
        board.style.width = `${baseSize}px`;

        const boardRect = board.getBoundingClientRect();
        state.cellW = boardRect.width / selected.cols;
        state.cellH = boardRect.height / selected.rows;
        updateBoardGrid();

        tray.innerHTML = '';
        board.querySelectorAll('.piece').forEach(node=>node.remove());

        const sliced = PUZZLE_APP.sliceImageToPieces(
          img,
          selected.cols,
          selected.rows,
          selected.shapeType
        );

        state.pieces = PUZZLE_APP.shuffle(sliced).map(pieceData=>{
          const el = document.createElement('div');
          el.className = 'piece';
          el.style.width = `${pieceData.widthUnits * state.cellW}px`;
          el.style.height = `${pieceData.heightUnits * state.cellH}px`;
          el.style.backgroundImage = `url(${pieceData.dataUrl})`;
          tray.appendChild(el);

          const piece = {...pieceData, el, placed:false};
          makeDraggable(piece);
          return piece;
        });

        state.placed = 0;
        state.pieces.forEach(piece=>{
          const pos = randomPosInTray(piece.el);
          piece.el.style.left = `${pos.x}px`;
          piece.el.style.top = `${pos.y}px`;
        });

        setStatus();
      }

      img.onload = render;
      img.onerror = ()=>{
        emptyNotice.textContent = '圖片載入失敗，請確認 JSON 與同名圖片都在同一個資料夾。';
        emptyNotice.classList.remove('hidden');
        gameWrap.classList.add('hidden');
      };

      window.addEventListener('resize', ()=>{
        if(img.complete){
          render();
        }
      });

      $('#btnShuffle').addEventListener('click', ()=>{
        if(img.complete){
          render();
        }
      });
    })();
  </script>
</body>
</html>
