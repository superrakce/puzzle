<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>拼圖遊玩</title><link rel="stylesheet" href="assets/style.css"/></head><body><div class="container"><div class="topbar"><a class="btn btn-secondary" href="start.html">← 返回圖片清單</a><div class="progress" id="progressText">拼圖進行中</div><div style="display:flex;gap:10px"><button id="btnShuffle" class="btn btn-secondary">重新打亂</button></div></div><section class="panel" style="padding:24px;"><div class="page-head"><div><h1 id="puzzleTitle" class="page-title">拼圖</h1><p id="puzzleDesc" class="page-desc">載入中...</p></div></div><div id="emptyNotice" class="notice hidden">請先回到圖片清單頁選擇拼圖。</div><div id="gameWrap" class="puzzle-layout hidden"><div class="board-wrap"><div id="board" class="board"><div id="boardGrid" class="board-grid"></div></div></div><div class="tray-wrap"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><strong>拼圖片區</strong><span id="pieceStatus" class="small"></span></div><div id="tray" class="tray"></div></div></div></section></div><script src="assets/app.js"></script><script>
(()=>{const $=s=>document.querySelector(s),selected=PUZZLE_APP.getSelectedPuzzle(),emptyNotice=$('#emptyNotice'),gameWrap=$('#gameWrap'),board=$('#board'),boardGrid=$('#boardGrid'),tray=$('#tray'),pieceStatus=$('#pieceStatus'),progressText=$('#progressText'),puzzleTitle=$('#puzzleTitle'),puzzleDesc=$('#puzzleDesc');if(!selected){emptyNotice.classList.remove('hidden');return}gameWrap.classList.remove('hidden');puzzleTitle.textContent=selected.name;puzzleDesc.textContent=`${selected.cols} × ${selected.rows} ｜ 共 ${selected.cols*selected.rows} 片`;const img=new Image();img.src=selected.imageDataUrl;let state={pieces:[],placed:0,pieceW:0,pieceH:0};function setStatus(){pieceStatus.textContent=`已完成 ${state.placed} / ${state.pieces.length}`;progressText.textContent=state.placed===state.pieces.length?'完成！':`拼圖進行中 ${state.placed}/${state.pieces.length}`}function updateBoardGrid(){boardGrid.style.backgroundSize=`${100/selected.cols}% ${100/selected.rows}%`}function randomPosInTray(pieceEl){const trayRect=tray.getBoundingClientRect(),w=pieceEl.offsetWidth||state.pieceW,h=pieceEl.offsetHeight||state.pieceH,maxX=Math.max(8,trayRect.width-w-8),maxY=Math.max(8,trayRect.height-h-8);return{x:Math.round(Math.random()*maxX),y:Math.round(Math.random()*maxY)}}function placeBackToTray(piece){piece.placed=false;piece.el.classList.remove('placed');tray.appendChild(piece.el);const p=randomPosInTray(piece.el);piece.el.style.left=p.x+'px';piece.el.style.top=p.y+'px'}function onDrop(piece,clientX,clientY){const br=board.getBoundingClientRect(),inside=clientX>=br.left&&clientX<=br.right&&clientY>=br.top&&clientY<=br.bottom;if(!inside){if(piece.placed)state.placed--;placeBackToTray(piece);setStatus();return}const relX=clientX-br.left,relY=clientY-br.top,targetCol=Math.floor(relX/state.pieceW),targetRow=Math.floor(relY/state.pieceH),correct=targetCol===piece.col&&targetRow===piece.row;if(correct){if(!piece.placed)state.placed++;piece.placed=true;piece.el.classList.add('placed');board.appendChild(piece.el);piece.el.style.left=(piece.col*state.pieceW)+'px';piece.el.style.top=(piece.row*state.pieceH)+'px'}else{if(piece.placed)state.placed--;placeBackToTray(piece)}setStatus();if(state.placed===state.pieces.length){setTimeout(()=>alert('完成拼圖！'),50)}}function makeDraggable(piece){let startX=0,startY=0,originX=0,originY=0,dragging=false;const onPointerMove=e=>{if(!dragging)return;const dx=e.clientX-startX,dy=e.clientY-startY;piece.el.style.left=originX+dx+'px';piece.el.style.top=originY+dy+'px'};const onPointerUp=e=>{if(!dragging)return;dragging=false;piece.el.classList.remove('dragging');piece.el.releasePointerCapture?.(e.pointerId);document.removeEventListener('pointermove',onPointerMove);document.removeEventListener('pointerup',onPointerUp);onDrop(piece,e.clientX,e.clientY)};piece.el.addEventListener('pointerdown',e=>{if(piece.placed){state.placed--;piece.placed=false;piece.el.classList.remove('placed');tray.appendChild(piece.el)}dragging=true;piece.el.classList.add('dragging');piece.el.setPointerCapture?.(e.pointerId);startX=e.clientX;startY=e.clientY;const parentRect=piece.el.parentElement.getBoundingClientRect();originX=piece.el.offsetLeft+(parentRect.left-tray.getBoundingClientRect().left);originY=piece.el.offsetTop+(parentRect.top-tray.getBoundingClientRect().top);tray.appendChild(piece.el);piece.el.style.left=originX+'px';piece.el.style.top=originY+'px';document.addEventListener('pointermove',onPointerMove);document.addEventListener('pointerup',onPointerUp)})}function render(){const baseSize=Math.min(720,window.innerWidth<900?window.innerWidth-72:720);board.style.width=baseSize+'px';const boardRect=board.getBoundingClientRect();state.pieceW=boardRect.width/selected.cols;state.pieceH=boardRect.height/selected.rows;updateBoardGrid();tray.innerHTML='';board.querySelectorAll('.piece').forEach(n=>n.remove());const sliced=PUZZLE_APP.sliceImageToPieces(img,selected.cols,selected.rows);state.pieces=PUZZLE_APP.shuffle(sliced).map(p=>{const el=document.createElement('div');el.className='piece';el.style.width=state.pieceW+'px';el.style.height=state.pieceH+'px';el.style.backgroundImage=`url(${p.dataUrl})`;tray.appendChild(el);const piece={...p,el,placed:false};makeDraggable(piece);return piece});state.placed=0;state.pieces.forEach(piece=>{const pos=randomPosInTray(piece.el);piece.el.style.left=pos.x+'px';piece.el.style.top=pos.y+'px'});setStatus()}img.onload=render;window.addEventListener('resize',()=>{if(img.complete)render()});$('#btnShuffle').addEventListener('click',()=>{if(img.complete)render()})})();
</script></body></html>
