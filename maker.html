<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>製作拼圖</title><link rel="stylesheet" href="assets/style.css"/></head><body><div class="container"><div class="topbar"><a class="btn btn-secondary" href="index.html">← 返回首頁</a><div class="progress">製作拼圖</div></div><section class="panel" style="padding:24px;"><div class="page-head"><div><h1 class="page-title">製作拼圖</h1><p class="page-desc">載入圖片後，設定水平與垂直切塊數，匯出圖片與 JSON 供開始拼圖頁讀取。</p></div></div><div class="grid-2"><div class="card"><div class="field"><label for="imageFile">載入圖片</label><input id="imageFile" type="file" accept="image/*"/></div><div class="field"><label for="puzzleName">拼圖名稱</label><input id="puzzleName" type="text" placeholder="請輸入拼圖名稱"/><div class="small">預設會使用圖片檔名。</div></div><div class="grid-2" style="gap:12px"><div class="field"><label for="cols">水平切塊數</label><input id="cols" type="number" min="2" max="12" value="4"/></div><div class="field"><label for="rows">垂直切塊數</label><input id="rows" type="number" min="2" max="12" value="4"/></div></div><div class="field"><label for="thumbSize">縮圖尺寸</label><input id="thumbSize" type="number" min="160" max="600" value="320"/></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button id="btnPrepare" class="btn btn-primary">產生設定預覽</button><button id="btnExportJson" class="btn btn-secondary" disabled>匯出 JSON</button><button id="btnExportImage" class="btn btn-secondary" disabled>匯出圖片</button></div><div id="makerNotice" class="notice hidden" style="margin-top:16px"></div></div><div class="card"><div class="field"><label>圖片預覽</label><div id="previewBox" class="preview-box"><span class="small">尚未載入圖片</span></div></div><div id="metaBox" class="small"></div></div></div></section></div><script src="assets/app.js"></script><script>
(()=>{const $=s=>document.querySelector(s),imageFile=$('#imageFile'),puzzleName=$('#puzzleName'),cols=$('#cols'),rows=$('#rows'),thumbSize=$('#thumbSize'),btnPrepare=$('#btnPrepare'),btnExportJson=$('#btnExportJson'),btnExportImage=$('#btnExportImage'),previewBox=$('#previewBox'),metaBox=$('#metaBox'),makerNotice=$('#makerNotice');let currentImageDataUrl=null,currentConfig=null,originalFileName='';function showNotice(t){makerNotice.textContent=t;makerNotice.classList.remove('hidden')}imageFile.addEventListener('change',async e=>{const file=e.target.files?.[0];if(!file)return;originalFileName=file.name.replace(/\.[^.]+$/,'');if(!puzzleName.value.trim())puzzleName.value=originalFileName;currentImageDataUrl=await PUZZLE_APP.readFileAsDataURL(file);previewBox.innerHTML='';const img=document.createElement('img');img.src=currentImageDataUrl;previewBox.appendChild(img);btnExportJson.disabled=true;btnExportImage.disabled=false;currentConfig=null;metaBox.textContent='原始尺寸：載入中...';img.onload=()=>{metaBox.textContent=`原始尺寸：${img.naturalWidth} × ${img.naturalHeight}`}});btnPrepare.addEventListener('click',()=>{if(!currentImageDataUrl){showNotice('請先載入圖片。');return}const name=puzzleName.value.trim()||originalFileName||'puzzle',c=Math.max(2,parseInt(cols.value||'4',10)),r=Math.max(2,parseInt(rows.value||'4',10)),t=Math.max(160,parseInt(thumbSize.value||'320',10));currentConfig={id:name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff_-]+/gi,'-').replace(/^-+|-+$/g,''),name,imageDataUrl:currentImageDataUrl,thumbDataUrl:currentImageDataUrl,cols:c,rows:r,thumbSize:t,createdAt:new Date().toISOString()};btnExportJson.disabled=false;btnExportImage.disabled=false;showNotice('已產生設定，可以匯出 JSON 與圖片。');metaBox.innerHTML=`<div>拼圖名稱：${name}</div><div>切塊數：${c} × ${r}</div><div>總片數：${c*r}</div>`});btnExportJson.addEventListener('click',()=>{if(!currentConfig){showNotice('請先按「產生設定預覽」。');return}PUZZLE_APP.downloadJSON(currentConfig,`${currentConfig.name}.json`)});btnExportImage.addEventListener('click',async()=>{if(!currentImageDataUrl){showNotice('請先載入圖片。');return}const res=await fetch(currentImageDataUrl),blob=await res.blob(),name=(puzzleName.value.trim()||originalFileName||'puzzle')+'.png';PUZZLE_APP.downloadBlob(blob,name)})})();
</script></body></html>
